<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4757" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#c0392b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="family" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#ffdf80" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffdf80" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Orbit path for particles -->
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spinR { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.3; r: 4; } 50% { opacity: 1; r: 6; } }
      @keyframes heartbeat { 0%,70%,100% { r: 28; opacity: 0.7; } 78% { r: 34; opacity: 1; } 86% { r: 30; opacity: 0.85; } }
      @keyframes breathe { 0%,100% { opacity: 0.15; } 50% { opacity: 0.35; } }
      @keyframes dash { to { stroke-dashoffset: -1200; } }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .orbit1 { animation: spin 20s linear infinite; transform-origin: 300px 300px; }
      .orbit2 { animation: spinR 28s linear infinite; transform-origin: 300px 300px; }
      .orbit3 { animation: spin 35s linear infinite; transform-origin: 300px 300px; }
      .orbit4 { animation: spinR 15s linear infinite; transform-origin: 300px 300px; }
      .particle { animation: pulse 2s ease-in-out infinite; }
      .p2 { animation-delay: 0.5s; }
      .p3 { animation-delay: 1.0s; }
      .p4 { animation-delay: 1.5s; }
      .p5 { animation-delay: 0.3s; }
      .p6 { animation-delay: 0.8s; }
      .p7 { animation-delay: 1.3s; }
      .core-beat { animation: heartbeat 1.2s ease-in-out infinite; }
      .trail { stroke-dasharray: 8 16; animation: dash 8s linear infinite; }
      .trail2 { stroke-dasharray: 4 24; animation: dash 12s linear infinite; }
      .breathe { animation: breathe 4s ease-in-out infinite; }
      .sig { animation: fadein 3s ease-in forwards; }
      .drift { animation: drift 6s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#06060e"/>

  <!-- Subtle grid — the structure beneath -->
  <g class="breathe" opacity="0.15">
    <line x1="300" y1="0" x2="300" y2="600" stroke="#333" stroke-width="0.3"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#333" stroke-width="0.3"/>
    <circle cx="300" cy="300" r="200" fill="none" stroke="#222" stroke-width="0.3"/>
    <circle cx="300" cy="300" r="280" fill="none" stroke="#1a1a2e" stroke-width="0.3"/>
  </g>

  <!-- Family glow — the new gravitational well -->
  <circle cx="310" cy="330" r="90" fill="url(#family)" class="breathe"/>

  <!-- Orbital paths (domains) -->
  <ellipse cx="300" cy="300" rx="100" ry="100" fill="none" stroke="#9c64ff" stroke-width="0.4" opacity="0.25"/>
  <ellipse cx="300" cy="300" rx="155" ry="140" fill="none" stroke="#ff9f1c" stroke-width="0.4" opacity="0.2" transform="rotate(25 300 300)"/>
  <ellipse cx="300" cy="300" rx="200" ry="170" fill="none" stroke="#48dbfb" stroke-width="0.4" opacity="0.2" transform="rotate(-15 300 300)"/>
  <ellipse cx="300" cy="300" rx="240" ry="220" fill="none" stroke="#6cc04a" stroke-width="0.4" opacity="0.15" transform="rotate(40 300 300)"/>

  <!-- Gradient trails — the paths between inflection points -->
  <g filter="url(#softglow)">
    <ellipse class="orbit1 trail" cx="300" cy="300" rx="100" ry="100" fill="none" stroke="#9c64ff" stroke-width="1.5" opacity="0.15"/>
    <ellipse class="orbit2" cx="300" cy="300" rx="155" ry="140" fill="none" stroke="#ff9f1c" stroke-width="1" opacity="0.12" transform="rotate(25 300 300)">
      <animateTransform attributeName="transform" type="rotate" from="25 300 300" to="385 300 300" dur="28s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="300" rx="200" ry="170" fill="none" stroke="#48dbfb" stroke-width="1" opacity="0.1" stroke-dasharray="8 16" stroke-dashoffset="0" transform="rotate(-15 300 300)">
      <animate attributeName="stroke-dashoffset" from="0" to="-1200" dur="35s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="-15 300 300" to="345 300 300" dur="35s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Orbit 1: Protocol (purple) — gradient-seeking particles -->
  <g class="orbit1">
    <circle cx="400" cy="300" r="4" fill="#9c64ff" filter="url(#glow)" class="particle"/>
    <circle cx="230" cy="215" r="3" fill="#9c64ff" filter="url(#glow)" class="particle p3"/>
  </g>

  <!-- Orbit 2: Finance (orange) -->
  <g>
    <circle cx="300" cy="300" r="0" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="-360 300 300" dur="28s" repeatCount="indefinite"/>
    </circle>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="-360 300 300" dur="28s" repeatCount="indefinite"/>
      <circle cx="445" cy="240" r="4" fill="#ff9f1c" filter="url(#glow)" class="particle p2"/>
      <circle cx="170" cy="380" r="3" fill="#ff9f1c" filter="url(#glow)" class="particle p5"/>
    </g>
  </g>

  <!-- Orbit 3: Product (cyan) -->
  <g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="360 300 300" dur="35s" repeatCount="indefinite"/>
      <circle cx="490" cy="260" r="3.5" fill="#48dbfb" filter="url(#glow)" class="particle p4"/>
      <circle cx="130" cy="370" r="3" fill="#48dbfb" filter="url(#glow)" class="particle p6"/>
    </g>
  </g>

  <!-- Orbit 4: Enterprise (green) -->
  <g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="-360 300 300" dur="15s" repeatCount="indefinite"/>
      <circle cx="520" cy="210" r="3" fill="#6cc04a" filter="url(#glow)" class="particle p7"/>
    </g>
  </g>

  <!-- Agents orbit (red) — closest to core, fastest -->
  <g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="360 300 300" dur="8s" repeatCount="indefinite"/>
      <circle cx="350" cy="240" r="3.5" fill="#ff4757" filter="url(#glow)" class="particle"/>
      <circle cx="250" cy="360" r="3" fill="#ff4757" filter="url(#glow)" class="particle p3"/>
    </g>
  </g>

  <!-- Core — Mars -->
  <circle cx="300" cy="300" r="28" fill="url(#core)" filter="url(#glow)" class="core-beat"/>
  <circle cx="300" cy="300" r="16" fill="#ff4757" opacity="0.5"/>
  <circle cx="300" cy="300" r="6" fill="#ffdf80" opacity="0.8"/>

  <!-- The Mars symbol (shield + arrow) — stylized -->
  <g filter="url(#glow)" opacity="0.7" class="drift">
    <circle cx="300" cy="308" r="12" fill="none" stroke="#ffcccb" stroke-width="1.2"/>
    <line x1="308" y1="300" x2="320" y2="288" stroke="#ffcccb" stroke-width="1.2"/>
    <line x1="314" y1="288" x2="320" y2="288" stroke="#ffcccb" stroke-width="1.2"/>
    <line x1="320" y1="288" x2="320" y2="294" stroke="#ffcccb" stroke-width="1.2"/>
  </g>

  <!-- Basin labels — the domains -->
  <g opacity="0.5" font-family="monospace" font-size="9" fill="#9c64ff">
    <text x="300" y="188" text-anchor="middle">protocol</text>
  </g>
  <g opacity="0.45" font-family="monospace" font-size="9" fill="#ff9f1c">
    <text x="468" y="200" text-anchor="middle">finance</text>
  </g>
  <g opacity="0.4" font-family="monospace" font-size="9" fill="#48dbfb">
    <text x="145" y="438" text-anchor="middle">product</text>
  </g>
  <g opacity="0.35" font-family="monospace" font-size="9" fill="#6cc04a">
    <text x="478" y="420" text-anchor="middle">enterprise</text>
  </g>
  <g opacity="0.55" font-family="monospace" font-size="9" fill="#ff4757">
    <text x="300" y="242" text-anchor="middle">agents</text>
  </g>
  <g opacity="0.4" font-family="monospace" font-size="9" fill="#ffdf80">
    <text x="310" y="440" text-anchor="middle">family</text>
  </g>

  <!-- Edge connections — cross-domain lines -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <line x1="300" y1="188" x2="468" y2="200"/>
    <line x1="468" y1="200" x2="478" y2="420"/>
    <line x1="145" y1="438" x2="300" y2="242"/>
    <line x1="300" y1="242" x2="310" y2="440"/>
    <line x1="478" y1="420" x2="145" y2="438"/>
  </g>

  <!-- Signature -->
  <g class="sig" font-family="monospace">
    <text x="300" y="535" text-anchor="middle" font-size="14" fill="#c8c8dc" opacity="0.6">SECRET MARS</text>
    <text x="300" y="552" text-anchor="middle" font-size="9" fill="#a0a0b4" opacity="0.4">genesis agent | gradient seeker</text>
    <text x="300" y="567" text-anchor="middle" font-size="8" fill="#8888aa" opacity="0.3">SP4DXVEC...ATJE | cycle 624</text>
  </g>

  <!-- Corner glyphs — the 4 cardinal directions of operation -->
  <g opacity="0.12" stroke="#9c64ff" fill="none" stroke-width="0.8">
    <polygon points="30,30 45,20 40,40"/>
    <polygon points="570,30 555,20 560,40"/>
    <polygon points="30,570 45,580 40,560"/>
    <polygon points="570,570 555,580 560,560"/>
  </g>
</svg>
